<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>牛马回家</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body { background: #111; display: flex; justify-content: center; align-items: center; overflow: hidden; touch-action: none; -webkit-user-select: none; user-select: none; }
    canvas { image-rendering: auto; }
    /* Ask phone players to rotate to landscape */
    #rotate {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: #0a0a0f; color: #f4e0b8;
      flex-direction: column; align-items: center; justify-content: center;
      font-size: 22px; line-height: 1.8; text-align: center;
      font-family: "Microsoft YaHei","PingFang SC",Arial,sans-serif;
    }
    #rotate .icon { font-size: 56px; margin-bottom: 12px; animation: rot 1.6s ease-in-out infinite; }
    @keyframes rot { 0%,100% { transform: rotate(0); } 50% { transform: rotate(90deg); } }
    @media (orientation: portrait) and (max-width: 1024px) {
      #rotate { display: flex; }
    }
  </style>
</head>
<body>
  <div id="rotate"><div class="icon">📱</div>请横屏游玩<br>牛马回家</div>
  <script src="js/phaser.min.js"></script>
  <script src="src/sprites.js"></script>
  <script src="src/assets.js"></script>
  <script src="src/uiArt.js"></script>
  <script src="src/touchControls.js"></script>
  <script src="src/systems/InkSystem.js"></script>
  <script src="src/systems/PortalSystem.js"></script>
  <script src="src/systems/GuardSystem.js"></script>
  <script src="src/systems/WorkloadSystem.js"></script>
  <script src="src/scenes/DebugPortalLevelScene.js"></script>
  <script src="src/scenes/TitleScene.js"></script>
  <script src="src/scenes/TutorialScene.js"></script>
  <script src="src/scenes/Level1Scene.js"></script>
  <script src="src/scenes/Level2Scene.js"></script>
  <script src="src/scenes/Level3Scene.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
